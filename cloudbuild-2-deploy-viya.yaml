  - id: Deploy_SAS_Viya
    name: europe-west2-docker.pkg.dev/platformtfe-203990/bupa-platform-build-reg/gcloud_helm:v1
    waitFor: ["Prepare_SAS_Viya_Images","SAS_Viya_Config_Setup","SAS_Viya_Write_Custom_Files","SAS_Viya_Modify_Config"]
    entrypoint: bash
    volumes:
      - name: shared
        path: /workspace/shared
    args:
      - -c
      - |
        echo "Install Kustomize ${_KUSTOMIZE_VERSION}"
        curl -s "https://api.github.com/repos/kubernetes-sigs/kustomize/releases/tags/kustomize%2Fv${_KUSTOMIZE_VERSION}" | grep browser_download_url | grep linux | cut -d '"' -f 4 | xargs curl -sL | tar xz
        mv kustomize /usr/local/bin/

        echo " "
        echo "SAS Viya Deployment Execution"
        kubectl get namespace ${_VIYA_NS} >/dev/null 2>&1 || kubectl create namespace ${_VIYA_NS}

        echo " "
        echo "Clean up sas-common files job"
        if kubectl get job -l app.kubernetes.io/name=sas-commonfiles -n ${_VIYA_NS} >/dev/null 2>&1; then
          kubectl delete job -l app.kubernetes.io/name=sas-commonfiles -n ${_VIYA_NS} --ignore-not-found
        fi

        cd /workspace/shared/deploy

        set -euo pipefail

        echo " "
        echo "Create site.yaml"
        kustomize build -o site.yaml 2> >(grep -v "Warning: 'vars' is deprecated. Please use 'replacements' instead.")

        echo " "
        echo "Apply site.yaml 1 of 5"
        echo "CRDs"
        kubectl apply --selector="sas.com/admin=cluster-api" --server-side --force-conflicts -f site.yaml \
          2> >(grep -v \
          -e 'unchanged' \
          -e 'ensure CRDs are installed first' \
          -e 'resource mapping not found for name')

        echo " "
        echo "Apply site.yaml 2 of 5"
        echo " Service Accounts and Roles"
        kubectl apply --selector="sas.com/admin=cluster-wide" -f site.yaml \
          | grep -v 'unchanged'

        echo " "
        echo "Apply site.yaml 3 of 5"
        echo "Rolebindings, ConfigMaps, Secrets and PVCs"
        kubectl apply --selector="sas.com/admin=cluster-local" -f site.yaml --prune \
          2> >(grep -v \
          -e 'unchanged' \
          -e 'Deprecated: kubectl apply will no longer prune non-namespaced resources by default when used with the --namespace flag in a future release' \
          -e 'Warning: v1 Endpoints is deprecated in v1.33+; use discovery.k8s.io/v1 EndpointSlice')

        echo " "
        echo "Apply site.yaml 4 of 5"
        echo "ConfigMaps, Services, Deployments, StatefulSets, DaemonSets, Jobs, CronJobs, PDBs, HPAs, Child HTTPProxys, Pod Templates, etc"
        kubectl apply --selector="sas.com/admin=namespace" -f site.yaml --prune \
          2> >(grep -v \
          -e 'unchanged' \
          -e 'Deprecated: kubectl apply will no longer prune non-namespaced resources by default when used with the --namespace flag in a future release' \
          -e 'Warning: v1 Endpoints is deprecated in v1.33+; use discovery.k8s.io/v1 EndpointSlice' \
          -e 'duplicate port name "http" with spec.template.spec.containers')

        echo " "
        echo "Apply site.yaml 5 of 5"
        echo "Deployments, StatefulSets, DaemonSets, Jobs, CronJobs, PDBs, Root HTTPProxys, PodTemplates, etc"
        kubectl apply --selector="sas.com/admin=namespace" -f site.yaml --prune --prune-allowlist=autoscaling/v2/HorizontalPodAutoscaler --prune-allowlist=projectcontour.io/v1/HTTPProxy \
          | grep -v 'unchanged'

        kubectl -n ${_VIYA_NS} delete pods -l app.kubernetes.io/managed-by=sas-cas-operator --force --ignore-not-found=true

        echo " "
        echo "Remove Docker Credentials"
        sed -i "s|  - .dockerconfigjson={.*|  - .dockerconfigjson={#}|g" /workspace/shared/deploy/kustomization.yaml

        echo "Remove SASBoot Credentials"
        sed -i "s|      password:.*|      password:.#|g" /workspace/shared/deploy/site-config/sitedefault.yaml

        echo "Remove PostgreSQL Service Account Key"
        rm /workspace/shared/deploy/site-config/postgres/ServiceAccountKey.json

        echo "Remove Postgres Credentials"
        rm /workspace/shared/deploy/site-config/postgres/platform-postgres-user.env

        echo " "
        echo "Step Complete"

  - id: Contour_HTTPProxy_Patches
    name: europe-west2-docker.pkg.dev/platformtfe-203990/bupa-platform-build-reg/gcloud_helm:v1
    waitFor: ["Deploy_SAS_Viya"]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        echo "Install yq"
        curl -s -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 --output /usr/local/bin/yq
        chmod +x /usr/local/bin/yq

        echo "Patch SAS Root HTTPProxy for TLS Fallback"
        kubectl -n ${_VIYA_NS} patch httpproxy sas-httpproxy-root --type='json' -p='[
          {"op":"add","path":"/spec/virtualhost/tls/enableFallbackCertificate","value":true}
          ]'

        # echo " "
        # echo "Validate SAS Root HTTPProxy TLS Fallback Patch"
        # kubectl -n ${_VIYA_NS} get httpproxy sas-httpproxy-root -o yaml

        echo " "
        echo "Patch SAS Root HTTPProxy for Logging"
        kubectl -n ${_VIYA_NS} patch httpproxy sas-httpproxy-root --type='json' -p='[
            {"op":"add","path":"/spec/includes/-","value":{"name":"v4m-osd","namespace":"${_LOG_NS}"}}
          ]'

        # echo " "
        # echo "Validate SAS Root HTTPProxy Logging Patch"
        # kubectl -n ${_VIYA_NS} get httpproxy sas-httpproxy-root -o yaml

        echo " "
        echo "Patch SAS Root HTTPProxy for Monitoring"
        kubectl -n ${_VIYA_NS} patch httpproxy sas-httpproxy-root --type='json' -p='[
            {"op":"add","path":"/spec/includes/-","value":{"name":"v4m-grafana","namespace":"${_MON_NS}"}}
          ]'

        # echo " "
        # echo "Validate SAS Root HTTPProxy Monitoring Patch"
        # kubectl -n ${_VIYA_NS} get httpproxy sas-httpproxy-root -o yaml

        echo " "
        echo "Create Root HTTPProxy for ${_VIYA_ALIAS}"
        kubectl -n ${_VIYA_NS} get httpproxy sas-httpproxy-root -o yaml \
        | yq e '
          .metadata.name = "sas-httpproxy-root-bupagroup" |
          .metadata.uid = null |
          .metadata.resourceVersion = null |
          .metadata.generation = null |
          .metadata.creationTimestamp = null |
          del(.status) |
          del(.metadata.annotations."kubectl.kubernetes.io/last-applied-configuration") |
          .spec.virtualhost.fqdn = "${_VIYA_ALIAS}"
        ' - \
        | kubectl apply -f -

        # echo " "
        # echo "Validate Root HTTPProxy for ${_VIYA_ALIAS}"
        # kubectl -n ${_VIYA_NS} get httpproxy sas-httpproxy-root-bupagroup -o yaml

        echo " "
        echo "Step Complete"

  - id: Persist_Deployment_Files
    name: europe-west2-docker.pkg.dev/platformtfe-203990/bupa-platform-build-reg/gcloud_helm:v1
    waitFor: ["Deploy_SAS_Viya"]
    entrypoint: bash
    volumes:
      - name: shared
        path: /workspace/shared
    args:
      - -c
      - |
        set -euo pipefail

        echo " "
        echo "Google Bucket"

        echo "Ensuring bucket gs://${_BUCKET} exists…"
        if ! gsutil ls -b "gs://${_BUCKET}" >/dev/null 2>&1; then
          echo "Bucket does not exist. Creating gs://${_BUCKET} in ${LOCATION}…"
          if ! gsutil mb -l "${LOCATION}" -c STANDARD -b on "gs://${_BUCKET}"; then
            echo "Bucket creation may have raced. Verifying existence…"
            gsutil ls -b "gs://${_BUCKET}"
          fi
        else
          echo "Bucket gs://${_BUCKET} already exists."
        fi
        echo "Ensure bucket has public-access-prevention"
        gcloud storage buckets update "gs://${_BUCKET}" --public-access-prevention

        echo "Export SAS Viya Deployment Files to Google Bucket"
        gsutil -m rsync -r -d -c -x '(^|/)(sas-bases|certs)(/|$)' \
          /workspace/shared/deploy "gs://${_BUCKET}/deploy"

        echo " "
        echo "Step Complete"

  - id: SAS_Viya_SASWork_CAS_Disk_Cache
    name: europe-west2-docker.pkg.dev/platformtfe-203990/bupa-platform-build-reg/gcloud_helm:v1
    waitFor: ["Deploy_SAS_Viya"]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        echo "Create SAS Work DaemonSet"
        cat << EOF > saswork-dir.yaml
        apiVersion: apps/v1
        kind: DaemonSet
        metadata:
          name: saswork-dir
          namespace: kube-system
        spec:
          selector:
            matchLabels:
              app: saswork-dir
          template:
            metadata:
              labels:
                app: saswork-dir
            spec:
              nodeSelector:
                cloud.google.com/gke-nodepool: compute
              tolerations:
                - operator: Exists
              initContainers:
                - name: create-saswork
                  image: alpine:3.20
                  securityContext:
                    privileged: true
                    runAsUser: 0
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -eux
                      for i in \$(seq 1 60); do
                        [ -d /host/mnt/disks/ssd0 ] && break
                        sleep 1
                      done
                      chroot /host /bin/sh -c "
                        mkdir -p ${_SASWORK} &&
                        chmod 0777 ${_SASWORK} &&
                        ls -lrt ${_SASWORK}/..
                      "
                  volumeMounts:
                    - name: host-root
                      mountPath: /host
              containers:
                - name: pause
                  image: registry.k8s.io/pause:3.9
              volumes:
                - name: host-root
                  hostPath:
                    path: /
                    type: Directory
        EOF

        kubectl apply -f saswork-dir.yaml

        echo "Check SAS Work DaemonSet"
        kubectl get ds saswork-dir -n kube-system
        kubectl logs -n kube-system -l app=saswork-dir -c create-saswork

        echo "Create CAS Disk Cache DaemonSet"
        cat << EOF > cas-disk-cache-dir.yaml
        apiVersion: apps/v1
        kind: DaemonSet
        metadata:
          name: cas-disk-cache-dir
          namespace: kube-system
        spec:
          selector:
            matchLabels:
              app: cas-disk-cache-dir
          template:
            metadata:
              labels:
                app: cas-disk-cache-dir
            spec:
              nodeSelector:
                cloud.google.com/gke-nodepool: cas
              tolerations:
                - operator: Exists
              initContainers:
                - name: create-cas-disk-cache
                  image: alpine:3.20
                  securityContext:
                    privileged: true
                    runAsUser: 0
                  command: ["/bin/sh", "-c"]
                  args:
                    - |
                      set -eux
                      for i in \$(seq 1 60); do
                        [ -d ${_CAS_DISK_CACHE}0 ] && break
                        sleep 1
                      done
                      chroot /host /bin/sh -c "
                        mkdir -p ${_CAS_DISK_CACHE} &&
                        chmod 0777 ${_CAS_DISK_CACHE}* &&
                        ls -lrt ${_CAS_DISK_CACHE}/..
                      "
                  volumeMounts:
                    - name: host-root
                      mountPath: /host
              containers:
                - name: pause
                  image: registry.k8s.io/pause:3.9
              volumes:
                - name: host-root
                  hostPath:
                    path: /
                    type: Directory
        EOF

        kubectl apply -f cas-disk-cache-dir.yaml

        echo "Check Create CAS Disk Cache DaemonSet"
        kubectl get ds cas-disk-cache-dir -n kube-system
        kubectl logs -n kube-system -l app=cas-disk-cache-dir -c create-cas-disk-cache

        echo " "
        echo "Step Complete"


  - id: Configure_Secrets_Store_CSI_Driver
    name: europe-west2-docker.pkg.dev/platformtfe-203990/bupa-platform-build-reg/gcloud_helm:v1
    waitFor: ["Deploy_SAS_Viya","Deploy_Secrets_CSI_Driver"]
    entrypoint: bash
    volumes:
      - name: shared
        path: /workspace/shared
    args:
      - -c
      - |
        set -euo pipefail                                                                                                                                 

        echo "SAS Compute - Create SecretProviderClass"
        cat <<EOF > compute-secret-provider-class.yaml
        apiVersion: secrets-store.csi.x-k8s.io/v1
        kind: SecretProviderClass
        metadata:
          name: compute-secrets
          namespace: ${_VIYA_NS}
        spec:
          provider: gcp
          parameters:
            secrets: |
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/sasmail_server_client_secret/versions/latest"
                path: "sasmail_server_client_secret"
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/sasmail_server_client_id/versions/latest"
                path: "sasmail_server_client_id"
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/entra_id_tenant_id/versions/latest"
                path: "entra_id_tenant_id"
        EOF

        kubectl apply -f compute-secret-provider-class.yaml

        echo "SAS Compute - Patch SAS Compute PodTemplate"
        cat <<EOF > sas-compute-job-config.secretmount.patch.yaml
        apiVersion: v1
        kind: PodTemplate
        metadata:
          name: sas-compute-job-config
          namespace: ${_VIYA_NS}
        template:
          spec:
            volumes:
              - name: gcp-secrets
                csi:
                  driver: secrets-store.csi.k8s.io
                  readOnly: true
                  volumeAttributes:
                    secretProviderClass: compute-secrets
            containers:
              - name: sas-programming-environment
                volumeMounts:
                  - name: gcp-secrets
                    mountPath: /var/secrets/gcp
                    readOnly: true
        EOF

        kubectl patch podtemplate sas-compute-job-config -n ${_VIYA_NS} \
          --type='strategic' --patch-file=sas-compute-job-config.secretmount.patch.yaml

        echo "SAS Batch - Create SecretProviderClass"
        cat <<EOF > batch-secret-provider-class.yaml
        apiVersion: secrets-store.csi.x-k8s.io/v1
        kind: SecretProviderClass
        metadata:
          name: batch-secrets
          namespace: ${_VIYA_NS}
        spec:
          provider: gcp
          parameters:
            secrets: |
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/entra_id_tenant_id/versions/latest"
                path: "entra_id_tenant_id"
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/snowflake_batch_encrypt_key/versions/latest"
                path: "snowflake_batch_encrypt_key"
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/snowflake_batch_p8/versions/latest"
                path: "snowflake_batch_p8.p8"
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/sasmail_server_client_secret/versions/latest"
                path: "sasmail_server_client_secret"
              - resourceName: "projects/${PROJECT_NUMBER}/secrets/sasmail_server_client_id/versions/latest"
                path: "sasmail_server_client_id"
        EOF

        kubectl apply -f batch-secret-provider-class.yaml

        echo "SAS Batch - Patch SAS Batch PodTemplate"
        cat <<EOF > sas-batch-pod-template.secretmount.patch.yaml
        apiVersion: v1
        kind: PodTemplate
        metadata:
          name: sas-batch-pod-template
          namespace: ${_VIYA_NS}
        template:
          spec:
            volumes:
              - name: gcp-secrets
                csi:
                  driver: secrets-store.csi.k8s.io
                  readOnly: true
                  volumeAttributes:
                    secretProviderClass: batch-secrets
            containers:
              - name: sas-programming-environment
                volumeMounts:
                  - name: gcp-secrets
                    mountPath: /var/secrets/gcp
                    readOnly: true
        EOF

        kubectl patch podtemplate sas-batch-pod-template -n ${_VIYA_NS} \
          --type='strategic' --patch-file=sas-batch-pod-template.secretmount.patch.yaml

        echo " "
        echo "Step Complete"

  - id: SAS_Viya_QA
    name: europe-west2-docker.pkg.dev/platformtfe-203990/bupa-platform-build-reg/gcloud_helm:v1
    waitFor: ["Deploy_SAS_Viya"]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        echo "Install JQ"
        apt-get install -y -qq jq >/dev/null

        echo " "
        echo "Wait for SAS to start 45 min timeout"
        kubectl wait -n "${_VIYA_NS}" \
          --for=condition=ready pod \
          --selector="app.kubernetes.io/name=sas-readiness" \
          --timeout=2700s && echo 'SAS Viya Start Up Complete'

        sleep 120

        kubectl wait -n "${_VIYA_NS}" \
          --for=condition=ready pod \
          --selector="app.kubernetes.io/name=sas-readiness" \
          --timeout=2700s

        echo " "
        echo "HTTPProxy Status"
        kubectl get httpproxy -A

        echo " "
        echo "Pod Status"
        kubectl get pods -n "${_VIYA_NS}" --no-headers \
          | awk '{print $3}' | sort | uniq -c

        echo " "
        echo "Pods Not Ready"
        kubectl -n ${_VIYA_NS} get pods -o jsonpath='{range .items[?(@.status.containerStatuses[].ready==false)]}{.metadata.name}{" "}{.status.phase}{"\n"}' | grep -v Succeeded

        echo " "
        echo "Key Pod Status"
        kubectl -n "${_VIYA_NS}" get pods \
          -l 'app in(sas-consul-server,sas-data-server-operator,sas-rabbitmq-server,sas-arke,sas-redis-server,sas-logon-app,sas-identities,sas-configuration,sas-authorization,sas-job-execution,sas-folders)'

        echo " "
        echo "Check Postgres Connectivity"
        kubectl -n "${_VIYA_NS}" logs -l app=sas-data-server-operator \
          | jq -Rr 'fromjson? | [.timeStamp,"[",.level,"]",.message] | join(" ")' \
          | grep Reconcile || true

        echo " "
        echo "SAS-Readiness Log"
        kubectl logs -n "${_VIYA_NS}" --selector="app.kubernetes.io/name=sas-readiness" \
          | jq -Rr 'fromjson? | [.timeStamp,"[",.level,"]",.message] | join(" ")' | tail -n 3
        
        echo "Pacth PVs to Retain"
        kubectl get pv | grep sas-viya-consul-data-volume-sas-consul-server | awk '{print $1}' | while read pv; do
          kubectl patch pv "$pv" -p '{"spec":{"persistentVolumeReclaimPolicy":"Retain"}}'
        done

        kubectl get pv | grep sas-common-backup-data | awk '{print $1}' | while read pv; do
          kubectl patch pv "$pv" -p '{"spec":{"persistentVolumeReclaimPolicy":"Retain"}}'
        done

        kubectl get pv | grep sas-cas-backup-data | awk '{print $1}' | while read pv; do
          kubectl patch pv "$pv" -p '{"spec":{"persistentVolumeReclaimPolicy":"Retain"}}'
        done

        echo " "
        echo "SAS PVCs"
        kubectl get pvc -n ${_VIYA_NS}

        echo " "
        echo "Step Complete"

