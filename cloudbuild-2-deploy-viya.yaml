    entrypoint: bash
    volumes:
      - name: shared
        path: /workspace/shared
    args:
      - -c
      - |
        set -euo pipefail

        echo "Install yq"
        curl -s -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 --output /usr/local/bin/yq
